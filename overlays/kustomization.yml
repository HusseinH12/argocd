apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../base
namespace: default

patches : # what resource will be changed
- target:
    kind: Deployment
    name: nginx-deployment
  patch: |- # what actually will be changed
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: nginx-deployment
    spec:
      replicas: 2
